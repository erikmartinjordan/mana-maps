name: Pre-deployment Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

concurrency:
  group: pre-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate local asset references in HTML
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          root = Path('.')
          html_files = [p for p in root.rglob('*.html') if '.git' not in p.parts and 'node_modules' not in p.parts]
          attr_re = re.compile(r'''\b(?:src|href)\s*=\s*(?P<q>["'])(?P<url>.*?)(?P=q)''', re.IGNORECASE)

          def should_skip(url: str) -> bool:
            u = url.strip()
            if not u:
              return True
            return (
              u.startswith('#') or
              u.startswith('http://') or
              u.startswith('https://') or
              u.startswith('//') or
              u.startswith('mailto:') or
              u.startswith('tel:') or
              u.startswith('javascript:') or
              u.startswith('data:')
            )

          missing = []

          for html in html_files:
            text = html.read_text(encoding='utf-8')
            for m in attr_re.finditer(text):
              raw = m.group('url').split('?', 1)[0].split('#', 1)[0]
              if should_skip(raw):
                continue

              if raw.startswith('/'):
                target = root / raw.lstrip('/')
              else:
                target = html.parent / raw

              if raw.endswith('/'):
                target = target / 'index.html'

              if not target.exists():
                missing.append((str(html), raw))

          if missing:
            print('Missing local asset references found:')
            for file_path, ref in missing:
              print(f'  - {file_path}: {ref}')
            raise SystemExit(1)

          print(f'Checked {len(html_files)} HTML files. All local references resolved.')
          PY

  js-syntax:
    name: JavaScript syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check JavaScript files
        run: |
          mapfile -t js_files < <(find js -type f -name '*.js' | sort)
          if [ "${#js_files[@]}" -eq 0 ]; then
            echo 'No JavaScript files found in ./js'
            exit 1
          fi

          for file in "${js_files[@]}"; do
            node --check "$file"
          done

          echo "Checked ${#js_files[@]} JS files."

  e2e-smoke:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright test runner
        run: |
          npm init -y
          npm install --save-dev @playwright/test

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npx playwright test -c tests/predeploy/playwright.config.js --reporter=line

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
