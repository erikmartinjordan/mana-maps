<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Perfil — Maña Maps</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body class="profile-page public-profile-page">
  <main class="profile-shell">
    <div class="profile-topbar">
      <a class="mana-logo-wrap" href="/">
        <div class="mana-logo-icon">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#30363B" stroke="rgba(1,1,1,0.5)" stroke-width="1"
              d="M42.3,-74.7C55.1,-65.8,66.1,-55.2,74.7,-42.4C83.2,-29.7,89.3,-14.8,89.7,0.2C90,15.2,84.6,30.5,74.3,40.2C64,49.8,48.7,54,35.6,62.1C22.4,70.2,11.2,82.3,-0.8,83.6C-12.7,84.9,-25.4,75.4,-36.1,65.9C-46.9,56.4,-55.6,46.8,-61.3,35.8C-66.9,24.8,-69.5,12.4,-72,-1.4C-74.5,-15.3,-76.9,-30.5,-70.9,-41C-64.9,-51.4,-50.6,-57.1,-37.4,-65.8C-24.2,-74.5,-12.1,-86.1,1.3,-88.4C14.7,-90.7,29.5,-83.6,42.3,-74.7Z"
              transform="translate(100 100)"/>
          </svg>
          <span>M&#771;</span>
        </div>
        <span class="logo-wordmark">Ma&#241;a</span><span class="logo-sub">Maps</span>
      </a>
      <nav class="profile-nav" aria-label="Navegación">
        <a class="btn btn-ghost" href="/gallery/">Galería</a>
        <a class="btn btn-primary" href="/map/">Editor</a>
      </nav>
    </div>

    <section id="public-profile-view" class="public-profile-card" style="display:block" aria-live="polite">
      <div class="public-profile-hero">
        <div id="public-profile-avatar" class="public-profile-avatar"><span>@</span></div>
        <div class="public-profile-copy">
          <h1 id="public-profile-name">Perfil</h1>
          <span id="public-profile-handle" class="public-profile-handle">@</span>
          <p id="public-profile-bio">Cargando perfil…</p>
          <div class="public-profile-stats">
            <strong id="public-profile-map-count">0</strong>
            <span>mapas públicos</span>
          </div>
        </div>
      </div>
      <div class="public-profile-section-head">
        <h2>Mapas públicos</h2>
        <a class="btn btn-ghost" href="/gallery/">Ver galería</a>
      </div>
      <div id="public-profile-maps" class="public-profile-grid">
        <div class="public-profile-empty">Cargando mapas…</div>
      </div>
    </section>
  </main>

  <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script defer src="/js/public-profile.js"></script>
</body>
</html>
